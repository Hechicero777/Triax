<!DOCTYPE html>
<html>
<head>
    <style>
        /* Estética Terminal Neon */
        body { 
            background: rgba(0,0,0,0.9); 
            color: #0f0; 
            font-family: 'Courier New', monospace; 
            margin: 0; padding: 5px; 
            font-size: 11px;
            overflow-x: hidden;
        }
        .msg { 
            border-left: 2px solid #0f0; 
            padding-left: 5px; 
            margin-bottom: 8px; 
            animation: fadeIn 0.5s ease-in;
        }
        .user { color: #fff; font-weight: bold; text-transform: uppercase; }
        .text { color: #0f0; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        /* Ocultar scrollbar pero permitir scroll */
        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>
    <div id="log">
        <div class="msg"><span class="user">SYS:</span> <span class="text">ENLACE TRIAX ESTABLECIDO...</span></div>
    </div>

    <script>
        // Función para añadir mensajes con scroll automático
        function addMsg(u, t) {
            const log = document.getElementById('log');
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `<span class="user">${u}:</span> <span class="text">${t}</span>`;
            log.appendChild(div);
            window.scrollTo(0, document.body.scrollHeight);
        }

        // Simulación de prueba (Luego lo conectamos a tu database.json)
        setTimeout(()=> addMsg("ALPHABET", "SISTEMA LISTO PARA DATOS"), 2000);
    </script>
</body>
</html>
