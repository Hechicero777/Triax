<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        /* Bloqueamos el movimiento del cuerpo */
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; /* Evita el scroll externo */
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none; /* Bloquea gestos de arrastre del navegador */
        }
        
        .slot-machine {
            position: relative;
            width: 100vw;
            height: 177.7vw; 
            max-width: 450px;
            max-height: 800px;
            background-image: url('maquina.png'); 
            background-size: 100% 100%;
            background-repeat: no-repeat;
        }

        .visor-chat {
            position: absolute;
            top: 31.5%; /* Ajuste fino según tu captura */
            left: 19.5%;
            width: 61%;
            height: 23%;
            background: #000;
            border: 1px solid #0f0;
            overflow: hidden;
        }

        /* El iframe sí puede tener su propio movimiento interno si el chat crece */
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }
    </style>
</head>
<body>

<div class="slot-machine">
    <div class="visor-chat">
        <iframe src="chat.html"></iframe>
    </div>
</div>

</body>
</html>
