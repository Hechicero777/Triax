<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; padding: 0; background: #000; display: flex; justify-content: center; }
        
        .slot-machine {
            position: relative;
            width: 100vw;
            height: 177.7vw; /* Proporción celular */
            max-width: 450px;
            max-height: 800px;
            /* Esta línea busca la imagen 'maquina.png' en tu raíz de GitHub */
            background-image: url('maquina.png'); 
            background-size: 100% 100%;
            background-repeat: no-repeat;
        }

        /* El hueco donde se verá el chat */
        .visor-chat {
            position: absolute;
            top: 31%; 
            left: 18%;
            width: 64%;
            height: 28%;
            background: rgba(0,0,0,0.8);
            border: 1px solid #0ff;
        }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="slot-machine">
    <div class="visor-chat">
        <iframe src="chat.html"></iframe>
    </div>
</div>

</body>
</html>
