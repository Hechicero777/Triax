<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000; 
            display: flex; justify-content: center; align-items: center; 
            touch-action: none; 
        }
        
        .slot-machine {
            position: relative;
            width: 100vw;
            height: 177.7vw; 
            max-width: 450px;
            max-height: 800px;
            background-image: url('maquina.png'); 
            background-size: 100% 100%;
            background-repeat: no-repeat;
        }

        /* CHAT EXPANDIDO (ZONA VERDE PANORÁMICA) */
        .pantalla-superior-chat {
            position: absolute;
            top: 2.5%;    /* Un pelín más arriba para ganar espacio */
            left: 5%;    /* Expandido hacia la izquierda */
            width: 90%;   /* ¡Ahora abarca casi todo el ancho! */
            height: 10%;  /* Un poco más alto para que respire */
            background: rgba(0, 0, 0, 0.85); 
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(0, 255, 0, 0.5);
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
        }

        /* ÁREA CENTRAL (Se mantiene libre para los rodillos) */
        .pantalla-central-libre {
            position: absolute;
            top: 31.5%;
            left: 19.5%;
            width: 61%;
            height: 23%;
            background: transparent;
        }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="slot-machine">
    <div class="pantalla-superior-chat">
        <iframe src="chat_pro.html"></iframe>
    </div>

    <div class="pantalla-central-libre">
        </div>
</div>

</body>
</html>
