<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        /* Bloqueo total de movimiento */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000; 
            display: flex; justify-content: center; align-items: center; 
            touch-action: none; 
        }
        
        .slot-machine {
            position: relative;
            width: 100vw;
            height: 177.7vw; 
            max-width: 450px;
            max-height: 800px;
            background-image: url('maquina.png'); 
            background-size: 100% 100%;
            background-repeat: no-repeat;
        }

        /* EL CHAT INTEGRADO EN LA ZONA VERDE SUPERIOR */
        .pantalla-superior-chat {
            position: absolute;
            top: 4.5%;    /* Justo donde empieza tu marca verde */
            left: 14%;   /* Centrado en el panel superior */
            width: 72%;  /* Abarca el ancho del panel */
            height: 7.5%; /* La altura exacta de esa sección */
            background: rgba(0, 0, 0, 0.8); /* Fondo negro con transparencia */
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid rgba(0, 255, 0, 0.3); /* Un borde sutil verde */
        }

        /* LA VENTANA CENTRAL (LIBRE) */
        .pantalla-central-libre {
            position: absolute;
            top: 31.5%;
            left: 19.5%;
            width: 61%;
            height: 23%;
            background: transparent;
        }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="slot-machine">
    <div class="pantalla-superior-chat">
        <iframe src="chat_pro.html"></iframe>
    </div>

    <div class="pantalla-central-libre">
        </div>
</div>

</body>
</html>
