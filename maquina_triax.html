<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', monospace; }
        
        /* Contenedor principal: Mantiene la simetría y la proporción */
        .slot-container {
            position: relative;
            width: 90vw;
            height: 160vw; /* Proporción 9:16 de celular */
            max-width: 450px;
            max-height: 800px;
            /* ¡OJO AQUÍ! Esta es tu imagen de fondo. */
            background-image: url('https://raw.githubusercontent.com/Hechicero777/Triax/main/tu-imagen-aqui.png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            box-shadow: 0 0 50px rgba(0,255,255,0.3); /* Brillo de neón */
        }

        /* ----------------------------------------------------
           Capa Media: Tus Ventanas (Iframes)
        ---------------------------------------------------- */

        /* PANTALLA PRINCIPAL (Central y Simétrica) */
        .pantalla-central {
            position: absolute;
            top: 31%; /* Ajusta estos % para que encajen */
            left: 20%;
            width: 60%;
            height: 30%;
            border: 2px solid #0ff; /* Marco de neón cyan */
            background: rgba(0,0,0,0.7);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Tu chat viviendo en GitHub */
        .chat-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ----------------------------------------------------
           Capa Superior: Tus Botones y Lógica
        ---------------------------------------------------- */

        /* Botón SPIN: El motor */
        .boton-spin {
            position: absolute;
            bottom: 25%;
            left: 35%;
            width: 30%;
            height: 8%;
            border: none;
            background: rgba(0,255,0,0.1); /* Ligeramente verde */
            cursor: pointer;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,255,0,0.5); /* Brillo de neón verde */
        }

        .boton-spin:active {
            box-shadow: 0 0 5px rgba(0,255,0,0.8);
            transform: scale(0.95);
        }

        /* Pantallas de Créditos, Apuestas, etc. */
        .display-stats {
            position: absolute;
            top: 25%;
            left: 20%;
            color: #ff0;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="slot-container">
    <div class="pantalla-central">
        <iframe class="chat-iframe" src="https://raw.githubusercontent.com/Hechicero777/Triax/main/chat.html"></iframe>
    </div>

    <div class="display-stats">CREDITS: <span id="creditos">1000</span></div>

    <button class="boton-spin" onclick="alert('¡GIRANDO EL ALPHABET!')"></button>
</div>

</body>
</html>
