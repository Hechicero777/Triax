<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { 
            margin: 0; padding: 0; background: transparent; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden; font-family: 'Courier New', monospace;
        }

        /* Gabinete Cuadrado Negro con Neón */
        .gabinete-cuadrado {
            display: flex; gap: 8px; padding: 15px;
            background: #000; /* Negro absoluto */
            border: 3px solid #0f0;
            box-shadow: 0 0 20px #0f0, inset 0 0 10px #0f0;
            position: relative;
        }

        .rodillo {
            width: 75px; height: 110px;
            background: #111; /* Fondo oscuro para los iconos */
            border: 1px solid #333;
            overflow: hidden;
            position: relative;
        }

        .tira-iconos {
            position: absolute; top: 0; left: 0; width: 100%;
            /* La transición ahora es de 3 segundos para que sea más lenta y elegante */
            transition: transform 3s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .icono {
            height: 110px;
            display: flex; justify-content: center; align-items: center;
            font-size: 55px;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.3));
        }

        .linea-pago {
            position: absolute; top: 50%; left: 0; width: 100%; height: 2px;
            background: rgba(255, 0, 0, 0.7); box-shadow: 0 0 8px #f00;
            z-index: 10; transform: translateY(-50%);
        }

        .boton-spin {
            margin-top: 20px;
            width: 130px; height: 130px; /* Cuadrado también */
            background: #000; border: 3px solid #ff0;
            color: #ff0; font-weight: bold; font-size: 18px;
            cursor: pointer; box-shadow: 0 0 15px #ff0;
            text-shadow: 0 0 5px #ff0;
            transition: 0.1s;
        }
        .boton-spin:active { background: #ff0; color: #000; }
    </style>
</head>
<body>

    <audio id="sndSpin" src="spin.mp3"></audio>
    <audio id="sndWin" src="win.mp3"></audio>

    <div class="gabinete-cuadrado">
        <div class="linea-pago"></div>
        <div class="rodillo"><div class="tira-iconos" id="r1"></div></div>
        <div class="rodillo"><div class="tira-iconos" id="r2"></div></div>
        <div class="rodillo"><div class="tira-iconos" id="r3"></div></div>
    </div>

    <button class="boton-spin" id="btn" onclick="ejecutarGiro()">SPIN</button>

    <script>
        const iconos = ["🔔", "7️⃣", "🍎", "🍒", "🍉", "💎"];
        const sndSpin = document.getElementById('sndSpin');
        const sndWin = document.getElementById('sndWin');

        function crearTira(el) {
            // Creamos una tira muy larga para que el giro lento se vea fluido
            for(let i=0; i<30; i++) {
                const div = document.createElement('div');
                div.className = 'icono';
                div.innerText = iconos[i % iconos.length];
                el.appendChild(div);
            }
        }

        crearTira(document.getElementById('r1'));
        crearTira(document.getElementById('r2'));
        crearTira(document.getElementById('r3'));

        let girando = false;

        function ejecutarGiro() {
            if (girando) return;
            girando = true;
            
            // SONIDO 1: Al iniciar el giro
            try { sndSpin.play(); } catch(e) {}

            for (let i = 1; i <= 3; i++) {
                const rodillo = document.getElementById(`r${i}`);
                const parada = Math.floor(Math.random() * iconos.length);
                // Multiplicador de vueltas para que tarde en frenar
                const vueltas = 15 + (i * 5); 
                const y = (parada + vueltas) * 110;
                
                rodillo.style.transform = `translateY(-${y}px)`;

                if(i === 3) {
                    setTimeout(() => {
                        girando = false;
                        // SONIDO 2: Al detenerse
                        try { sndWin.play(); } catch(e) {}
                    }, 3000); // Coincide con el tiempo de la transición CSS
                }
            }
        }
    </script>
</body>
</html>
