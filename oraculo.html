<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { 
            margin: 0; padding: 0; background: transparent; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden; font-family: 'Courier New', monospace;
        }

        /* El Botón Maestro */
        .lucky-button {
            position: relative;
            width: 120px; height: 120px;
            background: #000;
            border: 4px solid #0f0;
            border-radius: 50%;
            cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 20px #0f0, inset 0 0 15px #0f0;
            animation: pulse 1.5s infinite;
            transition: all 0.2s;
        }

        /* Animación de Respiración de Neón */
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 10px #0f0, inset 0 0 5px #0f0; }
            50% { transform: scale(1.05); box-shadow: 0 0 30px #0f0, inset 0 0 20px #0f0; }
            100% { transform: scale(1); box-shadow: 0 0 10px #0f0, inset 0 0 5px #0f0; }
        }

        /* El ícono que aparece */
        #icon-display {
            font-size: 50px;
            color: #fff;
            text-shadow: 0 0 10px #fff, 0 0 20px #0f0;
            filter: brightness(1.5);
            user-select: none;
        }

        /* Efecto de destello al presionar */
        .lucky-button:active {
            transform: scale(0.9);
            background: #0f0;
            box-shadow: 0 0 60px #0f0;
        }

        .lucky-button:active #icon-display {
            color: #000;
            text-shadow: none;
        }

        /* Etiqueta inferior */
        .label {
            position: absolute; bottom: -30px;
            color: #0f0; font-size: 12px; font-weight: bold;
            text-transform: uppercase; letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="lucky-button" onclick="lanzarSuerte()">
        <div id="icon-display">?</div>
        <div class="label">TRIAX SPIN</div>
    </div>

    <script>
        const iconos = ["💎", "🎰", "7️⃣", "🎲", "🍒", "🍀", "💰", "🃏", "👑", "🔥", "🌬️"];

        function lanzarSuerte() {
            const display = document.getElementById('icon-display');
            
            // Efecto de "ruleteo" rápido (cambia iconos a mil por hora)
            let vueltas = 0;
            const intervalo = setInterval(() => {
                display.innerText = iconos[Math.floor(Math.random() * iconos.length)];
                vueltas++;
                
                if (vueltas > 15) {
                    clearInterval(intervalo);
                    // Resultado final con brillo extra
                    display.style.filter = "hue-rotate(90deg)";
                    setTimeout(() => display.style.filter = "brightness(1.5)", 200);
                }
            }, 50);
        }
    </script>
</body>
</html>
